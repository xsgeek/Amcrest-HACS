- id: '1768005880053'
  alias: Shuttle Bay Open
  description: ''
  triggers:
  - type: opened
    device_id: 80b0a571e3a99c9dd6d908b8bdc7a421
    entity_id: 43410e75b06b4bd1c048a2c68a4f24b3
    domain: binary_sensor
    trigger: device
  conditions: []
  actions:
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.hatchopened
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d'') }}'
  - action: lifx.set_state
    target:
      entity_id: light.port
    data:
      power: true
      brightness_pct: 70
      rgb_color:
      - 255
      - 0
      - 40
  - action: lifx.set_state
    target:
      entity_id: light.starboard
    data:
      power: true
      brightness_pct: 70
      rgb_color:
      - 0
      - 255
      - 60
  - action: script.hovercraft_docking
    metadata: {}
    data:
      cycles: 10
      period: 3
      low_brightness: 25
      high_brightness: 100
      initial_brightness: 50
      offset_seconds: 0
      port_r: 255
      port_g: 0
      port_b: 40
      starboard_r: 0
      starboard_g: 255
      starboard_b: 60
      pre_pulse_transition: 1
      post_pulse_transition: 1
  mode: single
- id: '1768006470972'
  alias: Shuttle Bay Closed
  description: ''
  triggers:
  - type: not_opened
    device_id: 80b0a571e3a99c9dd6d908b8bdc7a421
    entity_id: 43410e75b06b4bd1c048a2c68a4f24b3
    domain: binary_sensor
    trigger: device
  conditions: []
  actions:
  - if:
    - condition: sun
      before: sunrise
      after: sunset
      after_offset: -00:35:00
    then:
    - action: lifx.set_state
      target:
        entity_id:
        - light.port
        - light.starboard
      data:
        power: true
        brightness_pct: 100
        rgb_color:
        - 255
        - 160
        - 0
    else:
    - action: light.turn_off
      metadata: {}
      target:
        entity_id:
        - light.port
        - light.starboard
      data: {}
  mode: single
- id: '1768510416874'
  alias: Check if Shuttlebay was left open
  description: Auto‑closes Shuttlebay if Hatch open too long
  triggers:
  - trigger: time_pattern
    minutes: /5
    hours: '*'
  conditions:
  - condition: state
    entity_id: binary_sensor.shuttlebay_door_wired_sensor
    state:
    - 'on'
  - condition: template
    value_template: '{{ hours_open_safe > 1 }}'
  actions:
  - device_id: 80b0a571e3a99c9dd6d908b8bdc7a421
    domain: cover
    entity_id: 970fa24fa83a5a0b280f8edbdd5a549e
    type: close
  mode: single
  variables:
    opened_at: '{{ states(''input_datetime.hatchopened'') }}'
    opened_dt: '{{ as_datetime(opened_at) }}'
    hours_open: '{{ (now() - opened_dt).total_seconds() / 3600 }}'
    hours_open_safe: "{% if opened_dt is not none %}\n  {{ hours_open }}\n{% else
      %}\n  0\n{% endif %}\n"
