- id: '1782746455818'
  alias: Front Door Bell Pressed
  description: ''
  triggers:
  - trigger: device
    domain: amcrest_ad410
    device_id: d85f23c6a0fedd4b469ad2bd39e4a557
    type: doorbell_pressed
  conditions:
  - condition: time
    after: 09:00:00
    before: '19:00:00'
  actions:
  - action: tts.speak
    metadata: {}
    target:
      entity_id: tts.home_assistant_cloud
    data:
      cache: true
      media_player_entity_id: media_player.home_assistant_voice_0a44ae_media_player
      message: There is someone at the door
  - repeat:
      count: 3
      sequence:
      - action: light.toggle
        target:
          device_id:
          - ee5a18abcf3185a7f2cc12e5034da452
          - d1592701c2b718e6f2000d82e6cc782d
        data: {}
      - action: switch.toggle
        target:
          device_id:
          - c9e5b1b9c5c875ec00c35c25a992294f
          - fd8e2f6a364c5985a10a64daf0f1521b
        data: {}
      - delay: 00:00:02
      - action: light.toggle
        target:
          device_id:
          - ee5a18abcf3185a7f2cc12e5034da452
          - d1592701c2b718e6f2000d82e6cc782d
        data: {}
      - action: switch.toggle
        target:
          device_id:
          - c9e5b1b9c5c875ec00c35c25a992294f
          - fd8e2f6a364c5985a10a64daf0f1521b
        data: {}
      - delay: 00:00:02
  mode: single
- id: '1783010856419'
  alias: Main Portal Human Porch Light
  description: Turn on the porch light when the AD410 detects a human, then turn it off two minutes after human detection clears.
  triggers:
  - trigger: device
    domain: amcrest_ad410
    device_id: d85f23c6a0fedd4b469ad2bd39e4a557
    type: human_detected
    id: human_detected
  - trigger: device
    domain: amcrest_ad410
    device_id: d85f23c6a0fedd4b469ad2bd39e4a557
    type: human_cleared
    id: human_cleared
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: human_detected
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.switchlinc_relay_dual_band_4b_f0_df
        data: {}
    - conditions:
      - condition: trigger
        id: human_cleared
      sequence:
      - delay: 00:02:00
      - condition: state
        entity_id: binary_sensor.main_portal_human
        state: 'off'
      - action: switch.turn_off
        target:
          entity_id: switch.switchlinc_relay_dual_band_4b_f0_df
        data: {}
  mode: restart