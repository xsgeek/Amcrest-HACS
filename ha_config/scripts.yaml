update_thermostat_settings:
  alias: update_thermostat_settings
  mode: single
  fields:
    heat_to:
      description: 'Keep it at least this warm:'
    cool_to:
      description: 'Keep it at least this cool:'
  sequence:
  - target:
      entity_id: climate.my_thermostat
    data:
      target_temp_low: '{{ heat_to }}'
      target_temp_high: '{{ cool_to }}'
    action: climate.set_temperature
  description: ''
